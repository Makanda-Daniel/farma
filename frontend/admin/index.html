<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmaOn — Admin</title>
  <script src="https://kit.fontawesome.com/54fc0ed631.js" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primeira: #2ecc71;
      --segunda: #2c3e50;
      --bt: #27ae60;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: var(--segunda);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 40px;
      width: 340px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .card i { margin-bottom: 16px; }
    .card h1 { color: var(--segunda); font-size: 1.4em; margin-bottom: 6px; }
    .card p { color: gray; font-size: 0.9em; margin-bottom: 24px; }
    .card input {
      width: 100%;
      height: 48px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1em;
      margin-bottom: 16px;
      outline-color: var(--bt);
    }
    .card button {
      width: 100%;
      height: 48px;
      background-color: var(--bt);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1em;
      cursor: pointer;
    }
    .card button:hover { background-color: var(--segunda); }
    #erro { color: red; font-size: 0.85em; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <i class="fa-solid fa-shield-halved fa-2xl" style="color:#2c3e50"></i>
    <h1>Painel Admin</h1>
    <p>FarmaOn — Acesso restrito</p>
    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="entrar()">ENTRAR</button>
    <p id="erro">Senha incorreta. Tente novamente.</p>
  </div>
  <script src="../js/config.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
